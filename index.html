<!DOCTYPE html>
<html lang="it" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura Ledger — Registro Finanziario</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: 'Courier New', Courier, monospace; }</style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
<div id="gate" class="flex items-center justify-center min-h-screen">
  <div class="bg-gray-900 border border-emerald-900 rounded-2xl px-8 py-10 w-full max-w-sm shadow-2xl">
    <div class="flex items-center gap-3 mb-2">
      <span class="text-emerald-400 text-2xl">⛓</span>
      <span class="text-white font-bold text-lg tracking-widest">AURA LEDGER</span>
    </div>
    <p class="text-emerald-700 text-xs mb-6">Arcadian Republic · Accesso riservato</p>
    <label class="text-gray-400 text-xs uppercase tracking-widest mb-1 block">Token bancario</label>
    <input id="tok" type="password" autocomplete="off"
           class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 text-sm
                  text-emerald-300 focus:outline-none focus:border-emerald-600 mb-3"
           placeholder="Incolla il tuo token…" />
    <button onclick="verify()"
            class="w-full bg-emerald-700 hover:bg-emerald-600 text-white font-bold py-2
                   rounded-lg text-sm transition-colors mb-2">Accedi</button>
    <p id="err" class="text-red-400 text-xs text-center hidden">Token non valido o scaduto.</p>
  </div>
</div>
<div id="ledger" class="hidden">
  <header class="bg-gradient-to-r from-gray-900 via-emerald-950 to-gray-900 border-b border-emerald-900 px-6 py-8 mb-10">
    <div class="max-w-3xl mx-auto">
      <div class="flex items-center gap-3 mb-1">
        <span class="text-emerald-400 text-3xl">⛓</span>
        <h1 class="text-3xl font-bold text-white tracking-widest">AURA LEDGER</h1>
      </div>
      <p class="text-emerald-700 text-sm mb-6 ml-12">Arcadian Republic · Registro Finanziario</p>
      <div class="flex flex-wrap gap-4 ml-12">
        <div class="bg-gray-900 border border-emerald-900 rounded-lg px-4 py-2">
          <span class="text-gray-500 block text-xs uppercase tracking-widest mb-1">Blocchi</span>
          <span class="text-emerald-400 font-bold text-xl">0</span>
        </div>
        <div class="bg-gray-900 border border-emerald-900 rounded-lg px-4 py-2">
          <span class="text-gray-500 block text-xs uppercase tracking-widest mb-1">Aggiornato</span>
          <span class="text-emerald-400 font-bold text-sm">2026-06-22 18:08:29 UTC</span>
        </div>
      </div>
    </div>
  </header>
  <main class="max-w-3xl mx-auto px-4 pb-20">
    
  </main>
  <footer class="text-center text-gray-700 text-xs py-8 border-t border-gray-900">
    Aura Ledger · Registro Finanziario Immutabile · Repubblica Arcadiana
  </footer>
</div>
<script>
const HASHES = [];
async function digest(s) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}
function show() {
  document.getElementById('gate').classList.add('hidden');
  document.getElementById('ledger').classList.remove('hidden');
}
async function verify() {
  const h = await digest(document.getElementById('tok').value.trim());
  if (HASHES.includes(h)) { sessionStorage.setItem('al_auth', h); show(); }
  else { document.getElementById('err').classList.remove('hidden'); }
}
document.getElementById('tok').addEventListener('keydown', e => { if(e.key==='Enter') verify(); });
(async () => {
  const stored = sessionStorage.getItem('al_auth');
  if (stored && HASHES.includes(stored)) show();
})();
</script>
</body>
</html>
